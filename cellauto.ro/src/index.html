      <script>

        const form = document.getElementById('wordLevel');

        // A select elemek generálása
        matrixWord.forEach((level, index) => {
          // Létrehozunk egy select elemet
          const select = document.createElement('select');
          select.name = `lev${index + 1}`;
          select.id = `lev${index + 1}`;

          // Hozzáadjuk az első opciót ("none")
          const noneOption = document.createElement('option');
          noneOption.value = '---';
          noneOption.selected = true;
          noneOption.textContent = '---';
          select.appendChild(noneOption);

          // Hozzáadjuk a többi opciót a matrixWord tömbből
          level.forEach((item, itemIndex) => {
            const option = document.createElement('option');
            option.value = item;
            //    option.value = `lev${index + 1}${itemIndex + 1}`;
            option.textContent = item;
            select.appendChild(option);
          });

          // Hozzáadjuk a select elemet a formhoz
